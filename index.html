<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoundLink — Acoustic Data Transfer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #090e12;
    --panel: #0d1520;
    --border: #1a2d3d;
    --tx: #00e5ff;
    --rx: #39ff14;
    --warn: #ff6b35;
    --text: #c8dce8;
    --dim: #3a5060;
    --glow-tx: 0 0 20px rgba(0,229,255,0.4);
    --glow-rx: 0 0 20px rgba(57,255,20,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(0,229,255,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(57,255,20,0.05) 0%, transparent 50%);
  }

  header { text-align: center; margin-bottom: 40px; }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 8vw, 5rem);
    letter-spacing: 0.15em;
    background: linear-gradient(90deg, var(--tx), #80ffee, var(--rx));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  header p {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    color: var(--dim);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .app {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    width: 100%;
    max-width: 900px;
  }

  @media (max-width: 640px) { .app { grid-template-columns: 1fr; } }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: relative;
    overflow: hidden;
  }

  .panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .tx-panel::before { background: var(--tx); box-shadow: var(--glow-tx); }
  .rx-panel::before { background: var(--rx); box-shadow: var(--glow-rx); }

  .panel-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.15em;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .tx-panel .panel-label { color: var(--tx); text-shadow: var(--glow-tx); }
  .rx-panel .panel-label { color: var(--rx); text-shadow: var(--glow-rx); }

  .badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    padding: 2px 8px;
    border-radius: 2px;
  }

  .tx-badge { background: rgba(0,229,255,0.12); color: var(--tx); border: 1px solid rgba(0,229,255,0.3); }
  .rx-badge { background: rgba(57,255,20,0.12); color: var(--rx); border: 1px solid rgba(57,255,20,0.3); }

  label {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    display: block;
    margin-bottom: 6px;
  }

  textarea {
    width: 100%;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    padding: 10px 12px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
    min-height: 80px;
  }

  textarea:focus { border-color: var(--tx); }

  .btn {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 0.15em;
    font-size: 1.1rem;
    padding: 10px 20px;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-tx { background: var(--tx); color: #000; box-shadow: 0 0 16px rgba(0,229,255,0.3); }
  .btn-tx:hover { box-shadow: 0 0 28px rgba(0,229,255,0.6); transform: translateY(-1px); }

  .btn-rx { background: var(--rx); color: #000; box-shadow: 0 0 16px rgba(57,255,20,0.3); }
  .btn-rx:hover { box-shadow: 0 0 28px rgba(57,255,20,0.6); transform: translateY(-1px); }

  .btn-stop { background: rgba(255,107,53,0.15); color: var(--warn); border: 1px solid var(--warn); }
  .btn-stop:hover { background: rgba(255,107,53,0.25); }

  canvas {
    width: 100%;
    height: 60px;
    border-radius: 3px;
    display: block;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
  }

  .status-bar {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    color: var(--dim);
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 18px;
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--dim);
    flex-shrink: 0;
    transition: background 0.3s, box-shadow 0.3s;
  }

  .dot.active-tx { background: var(--tx); box-shadow: 0 0 8px var(--tx); animation: pulse 0.8s infinite; }
  .dot.active-rx { background: var(--rx); box-shadow: 0 0 8px var(--rx); animation: pulse 0.8s infinite; }
  .dot.error { background: var(--warn); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0%; border-radius: 2px; transition: width 0.1s linear; }
  .tx-fill { background: var(--tx); box-shadow: 0 0 8px var(--tx); }
  .rx-fill { background: var(--rx); box-shadow: 0 0 8px var(--rx); }

  .settings { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  select {
    width: 100%;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    padding: 7px 10px;
    outline: none;
    cursor: pointer;
  }

  .decoded-output {
    background: rgba(0,0,0,0.5);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    min-height: 80px;
    word-break: break-all;
    color: var(--rx);
  }

  .decoded-output .placeholder { color: var(--dim); font-style: italic; }

  .info-row {
    display: flex;
    justify-content: space-between;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.68rem;
    color: var(--dim);
  }

  .freq-display {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: var(--dim);
    text-align: right;
  }

  .copy-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    padding: 3px 8px;
    background: rgba(57,255,20,0.1);
    border: 1px solid rgba(57,255,20,0.25);
    color: var(--rx);
    border-radius: 2px;
    cursor: pointer;
    letter-spacing: 0.1em;
  }
  .copy-btn:hover { background: rgba(57,255,20,0.2); }

  /* DEBUG */
  .debug-panel {
    width: 100%;
    max-width: 900px;
    background: #050a0d;
    border: 1px solid #1a2d3d;
    border-top: 2px solid #ff6b35;
    border-radius: 4px;
    padding: 16px 24px;
    margin-top: 4px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
  }
  .debug-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.15em;
    color: #ff6b35;
    margin-bottom: 10px;
  }
  .debug-meters {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }
  .debug-meter label { color: #3a5060; margin-bottom: 3px; }
  .debug-val { font-size: 0.9rem; color: #ff6b35; }
  .bar-wrap { height: 4px; background: #1a2d3d; border-radius: 2px; margin-top: 3px; }
  .bar { height: 100%; border-radius: 2px; transition: width 0.08s; }
  .bar-m { background: #00e5ff; }
  .bar-s { background: #ff6b35; }
  .bar-r { background: #39ff14; }
  .debug-log {
    background: rgba(0,0,0,0.5);
    border: 1px solid #1a2d3d;
    border-radius: 3px;
    padding: 8px 10px;
    height: 110px;
    overflow-y: auto;
    line-height: 1.7;
    color: #555;
  }
  .log-ok   { color: #39ff14; }
  .log-warn { color: #ff6b35; }
  .log-info { color: #00e5ff; }
</style>
</head>
<body>

<header>
  <h1>SoundLink</h1>
  <p>Acoustic Data Transfer // FSK // Bell 202</p>
</header>

<div class="app">

  <!-- TX -->
  <div class="panel tx-panel">
    <div class="panel-label">📡 Transmit <span class="badge tx-badge">TX</span></div>

    <div>
      <label>Message</label>
      <textarea id="tx-input" placeholder="Type your message...">Hello!</textarea>
    </div>

    <div class="settings">
      <div>
        <label>Baud Rate</label>
        <select id="baud-rate">
          <option value="5">5 baud (very slow)</option>
          <option value="10" selected>10 baud (slow)</option>
          <option value="20">20 baud</option>
        </select>
      </div>
      <div>
        <label>Volume</label>
        <select id="tx-vol">
          <option value="0.3">Low</option>
          <option value="0.6" selected>Medium</option>
          <option value="1.0">Max</option>
        </select>
      </div>
    </div>

    <div class="info-row">
      <span>MARK 1200Hz · SPACE 2200Hz</span>
      <span id="tx-char-count">0 chars</span>
    </div>

    <canvas id="tx-canvas" width="400" height="60"></canvas>

    <div class="progress-bar"><div class="progress-fill tx-fill" id="tx-progress"></div></div>

    <div class="status-bar">
      <div class="dot" id="tx-dot"></div>
      <span id="tx-status">Ready</span>
    </div>

    <button class="btn btn-tx" id="tx-btn" onclick="startTransmit()">▶ Transmit</button>
    <button class="btn btn-stop" id="tx-stop-btn" onclick="stopTransmit()" style="display:none">■ Stop</button>
  </div>

  <!-- RX -->
  <div class="panel rx-panel">
    <div class="panel-label">🎙️ Receive <span class="badge rx-badge">RX</span></div>

    <div>
      <label>Received Data</label>
      <div class="decoded-output" id="decoded-output">
        <span class="placeholder">Waiting for signal...</span>
      </div>
    </div>

    <div class="info-row">
      <span id="freq-display">— Hz</span>
      <button class="copy-btn" onclick="copyDecoded()">COPY</button>
    </div>

    <canvas id="rx-canvas" width="400" height="60"></canvas>

    <div class="progress-bar"><div class="progress-fill rx-fill" id="rx-progress"></div></div>

    <div class="status-bar">
      <div class="dot" id="rx-dot"></div>
      <span id="rx-status">Mic off</span>
    </div>

    <button class="btn btn-rx" id="rx-btn" onclick="startReceive()">🎙 Start Listening</button>
    <button class="btn btn-stop" id="rx-stop-btn" onclick="stopReceive()" style="display:none">■ Stop</button>
  </div>

</div>

<!-- DEBUG PANEL -->
<div class="debug-panel">
  <div class="debug-title">⚡ Debug</div>
  <div class="debug-meters">
    <div class="debug-meter">
      <label>MARK pwr (1200Hz)</label>
      <div class="debug-val" id="dbg-mark">—</div>
      <div class="bar-wrap"><div class="bar bar-m" id="dbg-mark-bar" style="width:0%"></div></div>
    </div>
    <div class="debug-meter">
      <label>SPACE pwr (2200Hz)</label>
      <div class="debug-val" id="dbg-space">—</div>
      <div class="bar-wrap"><div class="bar bar-s" id="dbg-space-bar" style="width:0%"></div></div>
    </div>
    <div class="debug-meter">
      <label>Ratio (>0.6=1 / <0.4=0)</label>
      <div class="debug-val" id="dbg-ratio">—</div>
      <div class="bar-wrap"><div class="bar bar-r" id="dbg-ratio-bar" style="width:0%"></div></div>
    </div>
  </div>
  <div class="debug-log" id="debug-log"><span style="color:#3a5060">Start listening to see debug output...</span></div>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────
const MARK_FREQ  = 1200;
const SPACE_FREQ = 2200;
const PREAMBLE   = [1,0,1,0,1,0,1,0];

// ─── TX STATE ────────────────────────────────────────────────
let txCtx = null, txAnimFrame = null, txOsc = null, txGain = null, txPlaying = false;

// ─── RX STATE ────────────────────────────────────────────────
let rxStream = null, rxAudioCtx = null, rxAnalyser = null;
let rxAnimFrame = null, rxListening = false, rxDecoded = '';
let rxBitRing = [], rxSyncState = 'hunting', rxFrameBuf = [];
let rxSampleTimer = null;

// ─── DEBUG ───────────────────────────────────────────────────
let dbgTick = 0;
function dbg(msg, cls) {
  const log = document.getElementById('debug-log');
  const d = document.createElement('div');
  if (cls) d.className = cls;
  d.textContent = msg;
  log.appendChild(d);
  if (log.children.length > 100) log.removeChild(log.firstChild);
  log.scrollTop = log.scrollHeight;
}

// ─── CHAR COUNT ──────────────────────────────────────────────
document.getElementById('tx-input').addEventListener('input', () => {
  document.getElementById('tx-char-count').textContent =
    document.getElementById('tx-input').value.length + ' chars';
});

// ═════════════════════════════════════════════════════════════
//  TRANSMITTER
// ═════════════════════════════════════════════════════════════
function textToBits(text) {
  // Double preamble so receiver has time to lock
  const bits = [...PREAMBLE, ...PREAMBLE, ...PREAMBLE];
  for (const ch of text) {
    const code = ch.charCodeAt(0);
    bits.push(0); // START
    for (let i = 0; i < 8; i++) bits.push((code >> i) & 1);
    bits.push(1); // STOP
  }
  // EOT x3
  for (let b = 0; b < 3; b++) {
    bits.push(0);
    for (let i = 0; i < 8; i++) bits.push((0x04 >> i) & 1);
    bits.push(1);
  }
  return bits;
}

async function startTransmit() {
  const msg = document.getElementById('tx-input').value.trim();
  if (!msg) return;

  const baud = parseInt(document.getElementById('baud-rate').value);
  const vol  = parseFloat(document.getElementById('tx-vol').value);
  const bitDuration = 1 / baud;
  const bits = textToBits(msg);

  txPlaying = true;
  document.getElementById('tx-btn').style.display = 'none';
  document.getElementById('tx-stop-btn').style.display = 'flex';
  setTxStatus('Transmitting...', 'active');

  txCtx  = new (window.AudioContext || window.webkitAudioContext)();
  txOsc  = txCtx.createOscillator();
  txGain = txCtx.createGain();
  txOsc.type = 'sine';
  txOsc.connect(txGain);
  txGain.connect(txCtx.destination);
  txOsc.start();
  txGain.gain.setValueAtTime(vol, txCtx.currentTime);

  const t0 = txCtx.currentTime;
  bits.forEach((bit, i) =>
    txOsc.frequency.setValueAtTime(bit ? MARK_FREQ : SPACE_FREQ, t0 + i * bitDuration)
  );

  drawTxWave(bits, baud);

  let elapsed = 0;
  const total = bits.length * bitDuration * 1000;
  const prog = setInterval(() => {
    if (!txPlaying) { clearInterval(prog); return; }
    elapsed += 100;
    document.getElementById('tx-progress').style.width = Math.min(100, elapsed / total * 100) + '%';
    if (elapsed >= total) clearInterval(prog);
  }, 100);

  setTimeout(() => { if (txPlaying) stopTransmit(true); }, total + 300);
}

function drawTxWave(bits, baud) {
  const canvas = document.getElementById('tx-canvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  let frame = 0;
  function draw() {
    if (!txPlaying) return;
    txAnimFrame = requestAnimationFrame(draw);
    ctx.clearRect(0,0,W,H);
    const now = frame * (1000/30);
    ctx.beginPath(); ctx.strokeStyle='#00e5ff'; ctx.lineWidth=1.5;
    ctx.shadowColor='#00e5ff'; ctx.shadowBlur=6;
    for (let x=0; x<W; x++) {
      const f = bits[Math.floor(x/W*bits.length)] ? MARK_FREQ : SPACE_FREQ;
      const y = H/2 + H*0.35 * Math.sin(2*Math.PI*f*(x/W*0.05+now/1000)*0.01);
      x===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.stroke(); frame++;
  }
  draw();
}

function stopTransmit(finished=false) {
  txPlaying = false;
  if (txOsc) { try { txOsc.stop(); } catch(e){} }
  if (txCtx) { txCtx.close(); txCtx=null; }
  if (txAnimFrame) cancelAnimationFrame(txAnimFrame);
  document.getElementById('tx-btn').style.display = 'flex';
  document.getElementById('tx-stop-btn').style.display = 'none';
  document.getElementById('tx-progress').style.width = finished ? '100%' : '0%';
  setTxStatus(finished ? 'Done ✓' : 'Stopped', 'idle');
  const c = document.getElementById('tx-canvas');
  c.getContext('2d').clearRect(0,0,c.width,c.height);
  if (finished) setTimeout(()=>document.getElementById('tx-progress').style.width='0%', 2000);
}

function setTxStatus(msg, state) {
  document.getElementById('tx-status').textContent = msg;
  document.getElementById('tx-dot').className =
    'dot' + (state==='active' ? ' active-tx' : state==='error' ? ' error' : '');
}

// ═════════════════════════════════════════════════════════════
//  GOERTZEL
// ═════════════════════════════════════════════════════════════
function goertzel(samples, freq, sr) {
  const N = samples.length;
  const k = Math.round(N * freq / sr);
  const w = 2 * Math.PI * k / N;
  const coeff = 2 * Math.cos(w);
  let s1=0, s2=0;
  for (let i=0; i<N; i++) {
    const s0 = samples[i] + coeff*s1 - s2;
    s2=s1; s1=s0;
  }
  return s1*s1 + s2*s2 - coeff*s1*s2;
}

function classifyBlock(samples, sr) {
  const pm = goertzel(samples, MARK_FREQ,  sr);
  const ps = goertzel(samples, SPACE_FREQ, sr);
  const total = pm + ps;

  // Update debug meters every 5 calls
  dbgTick++;
  if (dbgTick % 5 === 0) {
    const ratio = total > 0 ? pm/total : 0;
    document.getElementById('dbg-mark').textContent  = pm.toFixed(3);
    document.getElementById('dbg-space').textContent = ps.toFixed(3);
    document.getElementById('dbg-ratio').textContent = total > 0.001 ? ratio.toFixed(3) : 'silence';
    document.getElementById('dbg-mark-bar').style.width  = Math.min(100, pm/Math.max(total,0.001)*100)+'%';
    document.getElementById('dbg-space-bar').style.width = Math.min(100, ps/Math.max(total,0.001)*100)+'%';
    document.getElementById('dbg-ratio-bar').style.width = (ratio*100)+'%';
  }

  if (total < 0.002) return null; // silence threshold
  const ratio = pm / total;
  if (ratio > 0.58) return 1;
  if (ratio < 0.42) return 0;
  return null;
}

// ═════════════════════════════════════════════════════════════
//  RECEIVER  — uses setInterval sampling (worked before)
// ═════════════════════════════════════════════════════════════
async function startReceive() {
  try {
    rxStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch(e) {
    setRxStatus('Mic denied ✗', 'error');
    dbg('MIC ERROR: ' + e.message, 'log-warn');
    return;
  }

  rxAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (rxAudioCtx.state === 'suspended') rxAudioCtx.resume();

  const source = rxAudioCtx.createMediaStreamSource(rxStream);
  rxAnalyser = rxAudioCtx.createAnalyser();
  rxAnalyser.fftSize = 2048;
  rxAnalyser.smoothingTimeConstant = 0;
  source.connect(rxAnalyser);

  rxListening = true;
  rxDecoded   = '';
  rxBitRing   = [];
  rxSyncState = 'hunting';
  rxFrameBuf  = [];

  updateDecodedDisplay('');
  document.getElementById('rx-btn').style.display = 'none';
  document.getElementById('rx-stop-btn').style.display = 'flex';
  setRxStatus('Listening...', 'active');
  dbg('RX started. sampleRate=' + rxAudioCtx.sampleRate, 'log-info');

  const baud = parseInt(document.getElementById('baud-rate').value);
  // Sample every half-bit for better timing tolerance
  const intervalMs = (1000 / baud) / 2;
  const samplesNeeded = Math.floor(rxAudioCtx.sampleRate / baud);

  dbg('baud=' + baud + ' interval=' + intervalMs.toFixed(1) + 'ms samplesNeeded=' + samplesNeeded, 'log-info');

  rxSampleTimer = setInterval(() => {
    if (!rxListening) return;
    const buf = new Float32Array(rxAnalyser.fftSize);
    rxAnalyser.getFloatTimeDomainData(buf);
    // Use the most recent samplesNeeded samples
    const samples = buf.slice(buf.length - samplesNeeded);
    const bit = classifyBlock(samples, rxAudioCtx.sampleRate);
    onBit(bit);
  }, intervalMs);

  drawRxWave();
}

// Half-bit rate sampling with majority vote per full bit period
let _halfBits = [];
function onBit(bit) {
  if (bit === null) {
    // silence — reset if hunting
    if (rxSyncState === 'hunting') { rxBitRing = []; _halfBits = []; }
    document.getElementById('freq-display').textContent = '— (silence)';
    return;
  }

  document.getElementById('freq-display').textContent =
    bit ? MARK_FREQ + ' Hz ▲' : SPACE_FREQ + ' Hz ▼';

  // Collect 2 half-bits then vote
  _halfBits.push(bit);
  if (_halfBits.length < 2) return;
  const voted = _halfBits.filter(b=>b===1).length >= 1 ? 1 : 0;
  _halfBits = [];

  processFullBit(voted);
}

function processFullBit(bit) {
  if (rxSyncState === 'hunting') {
    rxBitRing.push(bit);
    if (rxBitRing.length > PREAMBLE.length * 4) rxBitRing.shift();

    const tail = rxBitRing.slice(-PREAMBLE.length);
    if (tail.length === PREAMBLE.length && tail.every((b,i)=>b===PREAMBLE[i])) {
      rxSyncState = 'synced';
      rxFrameBuf  = [];
      setRxStatus('Synced! Decoding...', 'active');
      dbg('SYNC ACQUIRED', 'log-ok');
      document.getElementById('rx-progress').style.width = '10%';
    }

  } else {
    rxFrameBuf.push(bit);

    if (rxFrameBuf.length === 10) {
      const start = rxFrameBuf[0];
      const stop  = rxFrameBuf[9];
      const data  = rxFrameBuf.slice(1,9);
      rxFrameBuf  = [];

      if (start===0 && stop===1) {
        let code = 0;
        for (let i=0; i<8; i++) code |= data[i] << i;

        if (code === 0x04) {
          setRxStatus('Received ✓', 'idle');
          dbg('EOT — done', 'log-ok');
          rxSyncState = 'hunting'; rxBitRing = [];
          document.getElementById('rx-progress').style.width = '100%';
          setTimeout(()=>document.getElementById('rx-progress').style.width='0%', 2000);
        } else if (code >= 32 && code < 127) {
          rxDecoded += String.fromCharCode(code);
          updateDecodedDisplay(rxDecoded);
          dbg('CHAR: ' + String.fromCharCode(code), 'log-info');
        }
      } else {
        dbg('FRAME ERR start=' + start + ' stop=' + stop, 'log-warn');
        rxSyncState = 'hunting'; rxBitRing = []; _halfBits = [];
        setRxStatus('Frame error, re-syncing...', 'active');
      }
    }
  }
}

function updateDecodedDisplay(text) {
  const el = document.getElementById('decoded-output');
  if (!text) el.innerHTML = '<span class="placeholder">Waiting for signal...</span>';
  else el.textContent = text;
}

function drawRxWave() {
  const canvas = document.getElementById('rx-canvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const arr = new Uint8Array(rxAnalyser.fftSize);
  function draw() {
    if (!rxListening) return;
    rxAnimFrame = requestAnimationFrame(draw);
    rxAnalyser.getByteTimeDomainData(arr);
    ctx.clearRect(0,0,W,H);
    ctx.beginPath(); ctx.strokeStyle='#39ff14'; ctx.lineWidth=1.5;
    ctx.shadowColor='#39ff14'; ctx.shadowBlur=6;
    const sw = W / arr.length;
    for (let i=0; i<arr.length; i++) {
      const y = arr[i]/128*H/2;
      i===0 ? ctx.moveTo(0,y) : ctx.lineTo(i*sw,y);
    }
    ctx.stroke();
  }
  draw();
}

function stopReceive() {
  rxListening = false;
  clearInterval(rxSampleTimer);
  if (rxAnimFrame) cancelAnimationFrame(rxAnimFrame);
  if (rxStream) rxStream.getTracks().forEach(t=>t.stop());
  if (rxAudioCtx) rxAudioCtx.close();
  document.getElementById('rx-btn').style.display = 'flex';
  document.getElementById('rx-stop-btn').style.display = 'none';
  setRxStatus('Mic off', 'idle');
  document.getElementById('freq-display').textContent = '— Hz';
  const c = document.getElementById('rx-canvas');
  c.getContext('2d').clearRect(0,0,c.width,c.height);
}

function setRxStatus(msg, state) {
  document.getElementById('rx-status').textContent = msg;
  document.getElementById('rx-dot').className =
    'dot' + (state==='active' ? ' active-rx' : state==='error' ? ' error' : '');
}

function copyDecoded() {
  navigator.clipboard.writeText(rxDecoded).then(() => {
    const b = document.querySelector('.copy-btn');
    b.textContent = 'COPIED!';
    setTimeout(()=>b.textContent='COPY', 1500);
  });
}
</script>
</body>
</html>
