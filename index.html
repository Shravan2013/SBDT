<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shravan's Sound Transfer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #090e12;
    --panel: #0d1520;
    --border: #1a2d3d;
    --tx: #00e5ff;
    --rx: #39ff14;
    --warn: #ff6b35;
    --text: #c8dce8;
    --dim: #3a5060;
    --glow-tx: 0 0 20px rgba(0,229,255,0.4);
    --glow-rx: 0 0 20px rgba(57,255,20,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(0,229,255,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(57,255,20,0.05) 0%, transparent 50%);
  }

  header {
    text-align: center;
    margin-bottom: 40px;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 8vw, 5rem);
    letter-spacing: 0.15em;
    background: linear-gradient(90deg, var(--tx), #80ffee, var(--rx));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  header p {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    color: var(--dim);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .app {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    width: 100%;
    max-width: 900px;
  }

  @media (max-width: 640px) {
    .app { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: relative;
    overflow: hidden;
  }

  .panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .tx-panel::before { background: var(--tx); box-shadow: var(--glow-tx); }
  .rx-panel::before { background: var(--rx); box-shadow: var(--glow-rx); }

  .panel-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.15em;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .tx-panel .panel-label { color: var(--tx); text-shadow: var(--glow-tx); }
  .rx-panel .panel-label { color: var(--rx); text-shadow: var(--glow-rx); }

  .badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    padding: 2px 8px;
    border-radius: 2px;
    vertical-align: middle;
  }

  .tx-badge { background: rgba(0,229,255,0.12); color: var(--tx); border: 1px solid rgba(0,229,255,0.3); }
  .rx-badge { background: rgba(57,255,20,0.12); color: var(--rx); border: 1px solid rgba(57,255,20,0.3); }

  label {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    display: block;
    margin-bottom: 6px;
  }

  textarea, input[type="text"] {
    width: 100%;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    padding: 10px 12px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus, input:focus { border-color: var(--tx); }
  .rx-panel textarea:focus { border-color: var(--rx); }

  textarea { min-height: 80px; }

  .btn {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 0.15em;
    font-size: 1.1rem;
    padding: 10px 20px;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-tx {
    background: var(--tx);
    color: #000;
    box-shadow: 0 0 16px rgba(0,229,255,0.3);
  }
  .btn-tx:hover { box-shadow: 0 0 28px rgba(0,229,255,0.6); transform: translateY(-1px); }
  .btn-tx:active { transform: translateY(0); }
  .btn-tx:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-rx {
    background: var(--rx);
    color: #000;
    box-shadow: 0 0 16px rgba(57,255,20,0.3);
  }
  .btn-rx:hover { box-shadow: 0 0 28px rgba(57,255,20,0.6); transform: translateY(-1px); }
  .btn-rx:active { transform: translateY(0); }
  .btn-rx:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-stop {
    background: rgba(255,107,53,0.15);
    color: var(--warn);
    border: 1px solid var(--warn);
  }
  .btn-stop:hover { background: rgba(255,107,53,0.25); }

  .visualizer-wrap {
    position: relative;
  }

  canvas {
    width: 100%;
    height: 60px;
    border-radius: 3px;
    display: block;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
  }

  .status-bar {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    color: var(--dim);
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 18px;
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--dim);
    flex-shrink: 0;
    transition: background 0.3s, box-shadow 0.3s;
  }

  .dot.active-tx { background: var(--tx); box-shadow: 0 0 8px var(--tx); animation: pulse 0.8s infinite; }
  .dot.active-rx { background: var(--rx); box-shadow: 0 0 8px var(--rx); animation: pulse 0.8s infinite; }
  .dot.error { background: var(--warn); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    border-radius: 2px;
    transition: width 0.1s linear;
  }

  .tx-fill { background: var(--tx); box-shadow: 0 0 8px var(--tx); }
  .rx-fill { background: var(--rx); box-shadow: 0 0 8px var(--rx); }

  .settings {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .setting-item label { margin-bottom: 4px; }

  select {
    width: 100%;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    padding: 7px 10px;
    outline: none;
    cursor: pointer;
  }

  .decoded-output {
    background: rgba(0,0,0,0.5);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    min-height: 80px;
    word-break: break-all;
    color: var(--rx);
    position: relative;
  }

  .decoded-output .placeholder {
    color: var(--dim);
    font-style: italic;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }

  .freq-display {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: var(--dim);
    text-align: right;
  }

  .info-row {
    display: flex;
    justify-content: space-between;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.68rem;
    color: var(--dim);
  }

  .copy-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    padding: 3px 8px;
    background: rgba(57,255,20,0.1);
    border: 1px solid rgba(57,255,20,0.25);
    color: var(--rx);
    border-radius: 2px;
    cursor: pointer;
    letter-spacing: 0.1em;
  }
  .copy-btn:hover { background: rgba(57,255,20,0.2); }
</style>
</head>
<body>

<header>
  <h1>SoundLink</h1>
  <p>Acoustic Data Transfer // FSK Modem // Bell 202</p>
</header>

<div class="app">

  <!-- TRANSMITTER -->
  <div class="panel tx-panel">
    <div class="panel-label">
      📡 Transmit
      <span class="badge tx-badge">TX</span>
    </div>

    <div>
      <label>Message to transmit</label>
      <textarea id="tx-input" placeholder="Type your message here...">Hello from SoundLink!</textarea>
    </div>

    <div class="settings">
      <div class="setting-item">
        <label>Baud Rate</label>
        <select id="baud-rate">
          <option value="10">10 baud (slow)</option>
          <option value="20" selected>20 baud</option>
          <option value="40">40 baud (fast)</option>
        </select>
      </div>
      <div class="setting-item">
        <label>Protocol</label>
        <select id="protocol">
          <option value="fsk">FSK Binary</option>
        </select>
      </div>
    </div>

    <div class="info-row">
      <span>MARK: 1200 Hz &nbsp;|&nbsp; SPACE: 2200 Hz</span>
      <span id="tx-char-count">0 chars</span>
    </div>

    <div class="visualizer-wrap">
      <label>Waveform</label>
      <canvas id="tx-canvas" width="400" height="60"></canvas>
    </div>

    <div class="progress-bar">
      <div class="progress-fill tx-fill" id="tx-progress"></div>
    </div>

    <div class="status-bar">
      <div class="dot" id="tx-dot"></div>
      <span id="tx-status">Ready to transmit</span>
    </div>

    <button class="btn btn-tx" id="tx-btn" onclick="startTransmit()">▶ Transmit</button>
    <button class="btn btn-stop" id="tx-stop-btn" onclick="stopTransmit()" style="display:none">■ Stop</button>
  </div>

  <!-- RECEIVER -->
  <div class="panel rx-panel">
    <div class="panel-label">
      🎙️ Receive
      <span class="badge rx-badge">RX</span>
    </div>

    <div>
      <label>Received Data</label>
      <div class="decoded-output" id="decoded-output">
        <span class="placeholder">Waiting for signal...</span>
      </div>
    </div>

    <div class="info-row">
      <span>Threshold: auto-calibrating</span>
      <button class="copy-btn" onclick="copyDecoded()">COPY</button>
    </div>

    <div class="visualizer-wrap">
      <label>Microphone Input</label>
      <canvas id="rx-canvas" width="400" height="60"></canvas>
    </div>

    <div>
      <label>Detected Frequency</label>
      <div class="freq-display" id="freq-display">— Hz</div>
    </div>

    <div class="progress-bar">
      <div class="progress-fill rx-fill" id="rx-progress"></div>
    </div>

    <div class="status-bar">
      <div class="dot" id="rx-dot"></div>
      <span id="rx-status">Microphone off</span>
    </div>

    <button class="btn btn-rx" id="rx-btn" onclick="startReceive()">🎙 Start Listening</button>
    <button class="btn btn-stop" id="rx-stop-btn" onclick="stopReceive()" style="display:none">■ Stop Listening</button>
  </div>

</div>

<script>
// ─── FSK CONFIG ────────────────────────────────────────────
const MARK_FREQ = 1200;  // binary 1 — audible (Bell 202 standard)
const SPACE_FREQ = 2200; // binary 0 — audible (Bell 202 standard)
const PREAMBLE = [1,0,1,0,1,0,1,0]; // sync pattern
const START_BIT = 0;
const STOP_BIT = 1;

// ─── TX STATE ─────────────────────────────────────────────
let txCtx = null, txAnimFrame = null, txOsc = null, txGain = null;
let txPlaying = false;

// ─── RX STATE ─────────────────────────────────────────────
let rxStream = null, rxAudioCtx = null, rxAnalyser = null;
let rxAnimFrame = null, rxListening = false;
let rxBitBuffer = [], rxDecoded = '', rxSampling = false;
let rxSampleTimer = null, rxBitsReceived = 0;

// ─── CHAR COUNT ────────────────────────────────────────────
document.getElementById('tx-input').addEventListener('input', () => {
  const v = document.getElementById('tx-input').value;
  document.getElementById('tx-char-count').textContent = v.length + ' chars';
});

// ─── TRANSMITTER ───────────────────────────────────────────
function textToBits(text) {
  const bits = [...PREAMBLE];
  for (const ch of text) {
    const code = ch.charCodeAt(0);
    bits.push(START_BIT);
    for (let i = 0; i < 8; i++) bits.push((code >> i) & 1);
    bits.push(STOP_BIT);
  }
  // End-of-transmission marker
  for (let b = 0; b < 3; b++) {
    bits.push(START_BIT);
    for (let i = 0; i < 8; i++) bits.push((0x04 >> i) & 1); // EOT char
    bits.push(STOP_BIT);
  }
  return bits;
}

async function startTransmit() {
  const msg = document.getElementById('tx-input').value.trim();
  if (!msg) return;

  const baud = parseInt(document.getElementById('baud-rate').value);
  const bitDuration = 1 / baud;
  const bits = textToBits(msg);

  txPlaying = true;
  document.getElementById('tx-btn').style.display = 'none';
  document.getElementById('tx-stop-btn').style.display = 'flex';
  setTxStatus('Transmitting...', 'active');

  txCtx = new (window.AudioContext || window.webkitAudioContext)();
  txOsc = txCtx.createOscillator();
  txGain = txCtx.createGain();
  txOsc.type = 'sine';
  txOsc.connect(txGain);
  txGain.connect(txCtx.destination);
  txOsc.start();
  txGain.gain.setValueAtTime(0.3, txCtx.currentTime);

  const startTime = txCtx.currentTime;
  bits.forEach((bit, i) => {
    const t = startTime + i * bitDuration;
    txOsc.frequency.setValueAtTime(bit === 1 ? MARK_FREQ : SPACE_FREQ, t);
  });

  // Visualizer
  drawTxWave(bits, baud);

  // Progress
  let elapsed = 0;
  const total = bits.length * bitDuration * 1000;
  const progInterval = setInterval(() => {
    if (!txPlaying) { clearInterval(progInterval); return; }
    elapsed += 100;
    const pct = Math.min(100, (elapsed / total) * 100);
    document.getElementById('tx-progress').style.width = pct + '%';
    if (pct >= 100) clearInterval(progInterval);
  }, 100);

  // Auto stop
  const totalMs = bits.length * bitDuration * 1000;
  setTimeout(() => { if (txPlaying) stopTransmit(true); }, totalMs + 200);
}

function drawTxWave(bits, baud) {
  const canvas = document.getElementById('tx-canvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  let frame = 0;
  const fps = 30;
  const bitDurationMs = 1000 / baud;

  function draw() {
    if (!txPlaying) return;
    txAnimFrame = requestAnimationFrame(draw);
    ctx.clearRect(0, 0, W, H);

    const now = frame * (1000 / fps);
    const currentBit = Math.floor(now / bitDurationMs) % bits.length;
    const freq = bits[currentBit] === 1 ? MARK_FREQ : SPACE_FREQ;

    ctx.beginPath();
    ctx.strokeStyle = '#00e5ff';
    ctx.lineWidth = 1.5;
    ctx.shadowColor = '#00e5ff';
    ctx.shadowBlur = 6;

    for (let x = 0; x < W; x++) {
      const t = (x / W) * 0.05 + now / 1000;
      const f = bits[Math.floor((x / W) * bits.length)] === 1 ? MARK_FREQ : SPACE_FREQ;
      const y = H / 2 + (H * 0.35) * Math.sin(2 * Math.PI * f * t * 0.01);
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
    frame++;
  }
  draw();
}

function stopTransmit(finished = false) {
  txPlaying = false;
  if (txOsc) { try { txOsc.stop(); } catch(e){} }
  if (txCtx) { txCtx.close(); txCtx = null; }
  if (txAnimFrame) cancelAnimationFrame(txAnimFrame);

  document.getElementById('tx-btn').style.display = 'flex';
  document.getElementById('tx-stop-btn').style.display = 'none';
  document.getElementById('tx-progress').style.width = finished ? '100%' : '0%';
  setTxStatus(finished ? 'Transmission complete ✓' : 'Stopped', finished ? 'idle' : 'idle');

  // Clear canvas
  const canvas = document.getElementById('tx-canvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (finished) setTimeout(() => document.getElementById('tx-progress').style.width = '0%', 2000);
}

function setTxStatus(msg, state) {
  document.getElementById('tx-status').textContent = msg;
  const dot = document.getElementById('tx-dot');
  dot.className = 'dot' + (state === 'active' ? ' active-tx' : state === 'error' ? ' error' : '');
}

// ─── RECEIVER ──────────────────────────────────────────────
async function startReceive() {
  try {
    rxStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch(e) {
    setRxStatus('Microphone denied ✗', 'error');
    return;
  }

  rxAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const source = rxAudioCtx.createMediaStreamSource(rxStream);
  rxAnalyser = rxAudioCtx.createAnalyser();
  rxAnalyser.fftSize = 2048;
  source.connect(rxAnalyser);

  rxListening = true;
  rxDecoded = '';
  rxBitBuffer = [];
  rxBitsReceived = 0;
  updateDecodedDisplay('');

  document.getElementById('rx-btn').style.display = 'none';
  document.getElementById('rx-stop-btn').style.display = 'flex';
  setRxStatus('Listening... (play transmitter nearby)', 'active');

  drawRxWave();
  startSampling();
}

function getFrequency() {
  if (!rxAnalyser) return 0;
  const buf = new Float32Array(rxAnalyser.fftSize);
  rxAnalyser.getFloatTimeDomainData(buf);

  const SIZE = buf.length;
  let rms = 0;
  for (let i = 0; i < SIZE; i++) rms += buf[i] * buf[i];
  rms = Math.sqrt(rms / SIZE);
  if (rms < 0.005) return 0;

  let r1 = 0, r2 = SIZE - 1;
  const THRES = 0.2;
  for (let i = 0; i < SIZE / 2; i++) if (Math.abs(buf[i]) < THRES) { r1 = i; break; }
  for (let i = 1; i < SIZE / 2; i++) if (Math.abs(buf[SIZE - i]) < THRES) { r2 = SIZE - i; break; }

  const buf2 = buf.slice(r1, r2);
  const c = new Array(buf2.length).fill(0);
  for (let i = 0; i < buf2.length; i++)
    for (let j = 0; j < buf2.length - i; j++)
      c[i] += buf2[j] * buf2[j + i];

  let d = 0;
  while (c[d] > c[d + 1]) d++;
  let maxval = -1, maxpos = -1;
  for (let i = d; i < buf2.length; i++) { if (c[i] > maxval) { maxval = c[i]; maxpos = i; } }
  if (maxpos < 1) return 0;

  let T0 = maxpos;
  const x1 = c[T0 - 1], x2 = c[T0], x3 = c[T0 + 1];
  if (x3 && x1) T0 = T0 + (x3 - x1) / (2 * (2 * x2 - x1 - x3));

  return rxAudioCtx.sampleRate / T0;
}

function classifyBit(freq) {
  if (freq === 0) return null;
  const markDist = Math.abs(freq - MARK_FREQ);
  const spaceDist = Math.abs(freq - SPACE_FREQ);
  if (Math.min(markDist, spaceDist) > 600) return null;
  return markDist < spaceDist ? 1 : 0;
}

function startSampling() {
  const baud = parseInt(document.getElementById('baud-rate').value);
  const interval = 1000 / baud;

  let syncState = 'hunting'; // 'hunting' | 'synced'
  let frameBuffer = [];
  let preambleMatch = 0;
  const PREAMBLE_LEN = PREAMBLE.length;

  rxSampleTimer = setInterval(() => {
    if (!rxListening) { clearInterval(rxSampleTimer); return; }

    const freq = getFrequency();
    const bit = classifyBit(freq);
    document.getElementById('freq-display').textContent = freq > 0 ? Math.round(freq) + ' Hz' : '— Hz';

    if (bit === null) return;

    if (syncState === 'hunting') {
      rxBitBuffer.push(bit);
      if (rxBitBuffer.length > PREAMBLE_LEN) rxBitBuffer.shift();
      // Check preamble match
      if (JSON.stringify(rxBitBuffer) === JSON.stringify(PREAMBLE)) {
        syncState = 'synced';
        frameBuffer = [];
        setRxStatus('Sync acquired! Decoding...', 'active');
        rxBitBuffer = [];
      }
    } else {
      // Collecting frames: START(1) + 8 data + STOP(1) = 10 bits
      frameBuffer.push(bit);
      const progress = (frameBuffer.length / 10) % 1;
      document.getElementById('rx-progress').style.width = (progress * 100) + '%';

      if (frameBuffer.length === 10) {
        const startBit = frameBuffer[0];
        const stopBit = frameBuffer[9];
        const dataBits = frameBuffer.slice(1, 9);

        if (startBit === 0 && stopBit === 1) {
          let charCode = 0;
          for (let i = 0; i < 8; i++) charCode |= dataBits[i] << i;

          if (charCode === 0x04) {
            // EOT
            setRxStatus('Message received ✓', 'idle');
            syncState = 'hunting';
            rxBitBuffer = [];
            document.getElementById('rx-progress').style.width = '100%';
            setTimeout(() => document.getElementById('rx-progress').style.width = '0%', 1500);
          } else if (charCode >= 32 && charCode < 127) {
            rxDecoded += String.fromCharCode(charCode);
            updateDecodedDisplay(rxDecoded);
          }
        }
        frameBuffer = [];
      }
    }
  }, interval);
}

function updateDecodedDisplay(text) {
  const el = document.getElementById('decoded-output');
  if (!text) {
    el.innerHTML = '<span class="placeholder">Waiting for signal...</span>';
  } else {
    el.textContent = text;
  }
}

function drawRxWave() {
  const canvas = document.getElementById('rx-canvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const bufLen = rxAnalyser ? rxAnalyser.fftSize : 512;
  const dataArr = new Uint8Array(bufLen);

  function draw() {
    if (!rxListening) return;
    rxAnimFrame = requestAnimationFrame(draw);
    rxAnalyser.getByteTimeDomainData(dataArr);

    ctx.clearRect(0, 0, W, H);
    ctx.beginPath();
    ctx.strokeStyle = '#39ff14';
    ctx.lineWidth = 1.5;
    ctx.shadowColor = '#39ff14';
    ctx.shadowBlur = 6;

    const sliceW = W / bufLen;
    let x = 0;
    for (let i = 0; i < bufLen; i++) {
      const v = dataArr[i] / 128.0;
      const y = v * H / 2;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      x += sliceW;
    }
    ctx.stroke();
  }
  draw();
}

function stopReceive() {
  rxListening = false;
  clearInterval(rxSampleTimer);
  if (rxAnimFrame) cancelAnimationFrame(rxAnimFrame);
  if (rxStream) rxStream.getTracks().forEach(t => t.stop());
  if (rxAudioCtx) rxAudioCtx.close();

  document.getElementById('rx-btn').style.display = 'flex';
  document.getElementById('rx-stop-btn').style.display = 'none';
  setRxStatus('Microphone off', 'idle');
  document.getElementById('freq-display').textContent = '— Hz';

  const canvas = document.getElementById('rx-canvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function setRxStatus(msg, state) {
  document.getElementById('rx-status').textContent = msg;
  const dot = document.getElementById('rx-dot');
  dot.className = 'dot' + (state === 'active' ? ' active-rx' : state === 'error' ? ' error' : '');
}

function copyDecoded() {
  navigator.clipboard.writeText(rxDecoded).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'COPIED!';
    setTimeout(() => btn.textContent = 'COPY', 1500);
  });
}
</script>
</body>
</html>
